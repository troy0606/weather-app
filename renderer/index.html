<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天氣查詢</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>🌤️ 全球天氣查詢</h1>
        </header>
        
        <main>
            <div class="search-section">
                <div class="search-container">
                    <input type="text" id="citySearch" placeholder="搜尋城市 (例如: 台北, 內湖區, New York)">
                    <button id="searchBtn">搜尋</button>
                </div>
                <div id="searchResults" class="search-results"></div>
            </div>

            <div class="weather-section" id="weatherSection" style="display: none;">
                <div class="current-weather">
                    <div class="weather-header">
                        <h2 id="cityName"></h2>
                        <p id="currentDate"></p>
                    </div>
                    
                    <div class="weather-main">
                        <div class="temperature">
                            <span id="currentTemp">--</span>°C
                        </div>
                        <div class="weather-icon">
                            <img id="weatherIcon" src="" alt="天氣圖示">
                        </div>
                        <div class="weather-description">
                            <p id="weatherDesc">--</p>
                        </div>
                    </div>
                    
                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="label">體感溫度</span>
                            <span id="feelsLike">--°C</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">濕度</span>
                            <span id="humidity">--%</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">風速</span>
                            <span id="windSpeed">-- km/h</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">氣壓</span>
                            <span id="pressure">-- hPa</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">能見度</span>
                            <span id="visibility">-- km</span>
                        </div>
                        <div class="detail-item">
                            <span class="label">紫外線指數</span>
                            <span id="uvIndex">--</span>
                        </div>
                    </div>
                </div>

                <div class="forecast-section">
                    <h3>5天預報</h3>
                    <div id="forecastContainer" class="forecast-container">
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
